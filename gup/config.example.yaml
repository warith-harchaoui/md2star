# Copy this file to config.yaml and fill values.
# NEVER commit real secrets or tokens.

auth:
  # OAuth client secret file downloaded from Google Cloud Console:
  credentials_json_path: "credentials.json"
  # OAuth token cache (auto-created on first run):
  token_json_path: "token.json"

# Scope choices:
# - https://www.googleapis.com/auth/drive.file  (recommended: least privilege for created files)
# - https://www.googleapis.com/auth/drive       (full drive)
scopes:
  - "https://www.googleapis.com/auth/drive.file"
