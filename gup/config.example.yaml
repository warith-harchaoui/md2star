# GUp configuration example
# =========================
#
# 1. Copy to config.yaml:
#      cp config.example.yaml config.yaml
#
# 2. Create OAuth credentials in Google Cloud Console:
#    - Enable Google Drive API
#    - Create OAuth 2.0 Client ID (Desktop app)
#    - Download JSON → save as credentials.json
#
# 3. Paths are relative to the directory where you run `gup`.
#    Use absolute paths if you run gup from different locations.
#
# SECURITY: Never commit config.yaml, credentials.json, or token.json.

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------

auth:
  # OAuth client secret (from Google Cloud Console → Credentials)
  credentials_json_path: "credentials.json"

  # Cached token (auto-created on first login, reused until expiry)
  token_json_path: "token.json"

# -----------------------------------------------------------------------------
# OAuth scopes (least privilege recommended)
# -----------------------------------------------------------------------------
# drive.file  → only files created by this app
# drive       → full Drive access (needed for Shared Drives)
scopes:
  - "https://www.googleapis.com/auth/drive.file"
