# md2star Pandoc defaults file
#
# Usage:
#   pandoc --defaults docx-star.yaml input.md -o output.docx
#
# This defaults file is installed into your Pandoc user data directory:
#   macOS/Linux: ~/.pandoc/defaults/docx-star.yaml
#   Windows:     %APPDATA%\pandoc\defaults\docx-star.yaml
#
# It assumes the following files are installed alongside it:
#   ../filters/md2star.lua
#   ../template.docx
#
# Output format: Microsoft Word (.docx)
to: docx

# Lua filters applied during conversion (title extraction, subtitle, etc.)
filters:
  - md2star.lua

# External YAML file merged into Pandoc metadata (author, date_format, lang)
metadata-files:
  - metadata.yaml

# Reference template controlling fonts, margins, styles, and logos
reference-doc: template.docx
